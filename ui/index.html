<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaTeX PDF Review - OpenCode</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      background: #0d1117;
      color: #e6edf3;
    }
    .split-container { display: flex; flex-direction: column; height: 100%; }
    .header-bar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      z-index: 10;
    }
    .header-bar .title { font-weight: 600; font-size: 13px; color: #e6edf3; letter-spacing: 0.02em; }
    .header-bar .pdf-path {
      font-size: 11px;
      color: #8b949e;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 400px;
    }
    .header-bar .status-badge {
      margin-left: auto;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
    }
    .header-bar .status-badge.syncing { background: #0d419d; border-color: #388bfd; color: #79c0ff; }
    .panes-row { flex: 1 1 0; display: flex; min-height: 0; }
    .pdf-pane {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #30363d;
      min-width: 0;
      overflow: hidden;
    }
    .pane-header {
      flex: 0 0 auto;
      padding: 6px 12px;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      font-size: 11px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pane-header .page-controls { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .pane-header .page-controls button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
    }
    .pane-header .page-controls button:hover { background: #30363d; }
    .pane-header .page-controls button:disabled { opacity: 0.4; cursor: default; }
    .pane-header .page-controls .page-display { font-size: 11px; color: #8b949e; }
    .pdf-scroll {
      flex: 1 1 0;
      overflow-y: auto;
      overflow-x: auto;
      padding: 16px;
      background: #525659;
      position: relative;
    }
    .pdf-canvas-wrapper { position: relative; display: inline-block; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
    #pdf-canvas { display: block; cursor: crosshair; }
    .pdf-highlight-overlay {
      position: absolute;
      background: rgba(56, 139, 253, 0.25);
      border: 2px solid rgba(56, 139, 253, 0.7);
      border-radius: 2px;
      pointer-events: none;
      transition: all 0.15s ease;
    }
    .pdf-annotation-pin {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #f78166;
      border: 2px solid #fff;
      cursor: pointer;
      transform: translate(-50%, -50%);
      z-index: 5;
    }
    .pdf-annotation-pin:hover { background: #ff9a8b; transform: translate(-50%, -50%) scale(1.3); }
    .pdf-annotation-pin.active { background: #56d364; }
    .latex-pane { flex: 1 1 0; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    .latex-pane .pane-header { justify-content: space-between; }
    .latex-file-badge {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 10px;
      color: #79c0ff;
      background: #0d2137;
      border: 1px solid #1f4e79;
      border-radius: 4px;
      padding: 1px 6px;
    }
    .codemirror-wrapper { flex: 1 1 0; overflow: hidden; position: relative; }
    .cm-editor {
      height: 100%;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace !important;
      font-size: 13px !important;
      background: #0d1117 !important;
    }
    .cm-scroller { overflow: auto !important; }
    .cm-gutters {
      background: #0d1117 !important;
      border-right: 1px solid #21262d !important;
      color: #3d444d !important;
    }
    .cm-activeLineGutter { background: #161b22 !important; color: #8b949e !important; }
    .cm-activeLine { background: #161b22 !important; }
    .cm-synctex-highlight {
      background: rgba(255, 235, 0, 0.5) !important;
      border-left: 6px solid #ffeb3b !important;
      border-right: 2px solid #ffeb3b !important;
      padding-left: 3px !important;
      padding-right: 3px !important;
      box-shadow: inset 0 0 8px rgba(255, 235, 0, 0.6), 0 0 8px rgba(255, 235, 0, 0.3) !important;
    }
    .cm-synctex-highlight::before {
      content: "<- SYNCED LINE" !important;
      position: absolute !important;
      right: 100% !important;
      margin-right: 8px !important;
      font-size: 11px !important;
      color: #ffeb3b !important;
      font-weight: bold !important;
      white-space: nowrap !important;
      padding: 2px 4px !important;
      background: rgba(0, 0, 0, 0.5) !important;
      border-radius: 2px !important;
    }
    .comment-panel {
      flex: 0 0 auto;
      border-top: 1px solid #30363d;
      background: #161b22;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .comment-panel-header {
      font-size: 11px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .comment-panel .sync-info {
      font-size: 11px;
      color: #56d364;
      font-family: "SFMono-Regular", Consolas, monospace;
    }
    .comment-panel .sync-info.empty { color: #3d444d; }
    .comment-textarea {
      width: 100%;
      min-height: 80px;
      max-height: 180px;
      padding: 8px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    .comment-textarea:focus { border-color: #388bfd; }
    .comment-textarea::placeholder { color: #3d444d; }
    .comment-actions { display: flex; align-items: center; gap: 8px; }
    .btn-submit {
      padding: 6px 16px;
      background: #238636;
      border: 1px solid #2ea043;
      color: #fff;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: #2ea043; }
    .btn-submit:disabled { background: #21262d; border-color: #30363d; color: #484f58; cursor: not-allowed; }
    .btn-clear {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-clear:hover { background: #21262d; color: #e6edf3; }
    .submit-status { font-size: 11px; margin-left: auto; }
    .submit-status.ok { color: #56d364; }
    .submit-status.err { color: #f78166; }
    .annotation-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 120px;
      overflow-y: auto;
    }
    .annotation-item {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #30363d;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #0d1117;
    }
    .annotation-item:hover { background: #21262d; }
    .annotation-item.active { border-color: #388bfd; background: #0d2137; }
    .annotation-item .ann-status { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .ann-status.pending { background: #e3b341; }
    .ann-status.submitted { background: #56d364; }
    .annotation-item .ann-loc {
      font-family: "SFMono-Regular", Consolas, monospace;
      color: #79c0ff;
      white-space: nowrap;
    }
    .annotation-item .ann-comment {
      color: #8b949e;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .resize-handle { flex: 0 0 4px; background: #30363d; cursor: col-resize; transition: background 0.15s; }
    .resize-handle:hover { background: #388bfd; }
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 17, 23, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      font-size: 13px;
      color: #8b949e;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #30363d;
      border-top-color: #388bfd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-banner {
      background: #2d1a1a;
      border: 1px solid #f78166;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      color: #f78166;
      margin: 8px;
    }
    .empty-pdf {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #3d444d;
      gap: 8px;
    }
    .empty-pdf svg { opacity: 0.3; }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-overlay">
      <span class="spinner"></span>
      Loading review session...
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react/jsx-dev-runtime": "https://esm.sh/react@18.3.1/jsx-dev-runtime",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
    }
  }
  </script>

  <script type="module">
    import { initApp } from '/app.js';
    initApp(document.getElementById('root'));
  </script>
</body>
</html>
