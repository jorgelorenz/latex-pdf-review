name: Publish npm package

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: |
      github.event.pull_request.merged == true && 
      contains(github.head_ref, 'release-please')

    runs-on: ubuntu-latest

    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      # Enable when test exists
      # - name: Test
      #   run: bun test

      - run: node -p "require('./package.json').version"

      - name: Publish to npm
        run: npm publish --access public --verbose --provenance
        env:
          NPM_CONFIG_AUDIENCE: https://registry.npmjs.org

      - name: Upload npm debug log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-log
          path: /home/runner/.npm/_logs/